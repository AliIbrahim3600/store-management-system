services:
  postgres:
    image: postgres:18
    container_name: store_management_db
    env_file: ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d store_management"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
